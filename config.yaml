mode: local  # local or graph

sharepoint:
  tenant_id: "YOUR_TENANT_ID"
  client_id: "YOUR_CLIENT_ID"
  authority: "https://login.microsoftonline.com/YOUR_TENANT_ID"
  site_id: "YOUR_SITE_ID"
  source_type: "document_library"  # document_library or list

  # Option A: direct SharePoint links (recommended for this project)
  incident_file_url: "https://tcco.sharepoint.com/:x:/r/sites/OperationsSafetyExecutiveGroup/Shared%20Documents/Operations%20Safety%20Executive%20Group/EHS%20Data/Power%20BI%20Dashboard/Weekly%20Claims%20Report.xlsx?d=w51bc1e4d85b64095b4c3ba3939603d6a&csf=1&web=1&e=iZhh4a"
  observation_file_url: "https://tcco.sharepoint.com/:x:/r/sites/OperationsSafetyExecutiveGroup/Shared%20Documents/Operations%20Safety%20Executive%20Group/EHS%20Data/Power%20BI%20Dashboard/Observation%20Export%20-%20Safety%20Inspection.xlsx?d=w70bab51c51bb41c78daaeb9918c806ee&csf=1&web=1&e=rmcifs"
  exposure_file_url: "https://tcco.sharepoint.com/:x:/r/sites/OperationsSafetyExecutiveGroup/Shared%20Documents/Operations%20Safety%20Executive%20Group/EHS%20Data/Power%20BI%20Dashboard/Safety_Metrics.xlsx?d=w13b20f91a1b84c14b3653f3465c7e8ea&csf=1&web=1&e=Aa9vbf"

  # Option B: drive + relative paths (optional alternate method)
  document_library_drive_id: ""
  incident_file_path: ""
  observation_file_path: ""
  exposure_file_path: ""

  # List mode names
  incident_list_name: "Incidents"
  observation_list_name: "Observations"
  exposure_list_name: "SafetyMetrics"

local:
  incident_path: "sample_data/incidents.csv"
  observation_path: "sample_data/observations.csv"
  exposure_path: "sample_data/exposure.csv"

analysis:
  time_granularity: "M"
  lag_months: [0, 1, 2]
  high_incident_threshold_quantile: 0.7
  low_observation_threshold_quantile: 0.3
  leading_indicator_weights:
    observation_volume: 0.25
    corrective_action_rate: 0.25
    comment_quality: 0.20
    closure_speed: 0.20
    high_risk_coverage: 0.10

column_mapping:
  incidents:
    incident_id: ["incident_id", "id", "record_id", "claim number", "claim_number"]
    date: ["date", "incident_date", "event_date", "loss date", "loss_date"]
    location: ["project number", "project_number", "location", "site", "job_site", "region"]
    severity: ["severity", "injury_severity", "classification"]
    category: ["category", "type", "hazard_type", "incident_type", "loss type", "loss_type"]
    description: ["description", "details", "summary"]
    trade_contractor: ["trade", "contractor", "trade_contractor"]
    serious_potential: ["serious_potential", "sif_potential", "high_potential"]

  observations:
    observation_id: ["observation_id", "id", "record_id"]
    date: ["date", "observation_date", "event_date", "observation date"]
    location: ["project number", "project_number", "location", "site", "job_site", "region"]
    category: ["category", "hazard_type", "activity"]
    observation_type: ["observation_type", "type", "audit_type"]
    at_risk_count: ["at_risk_count", "at_risk", "unsafe_count"]
    safe_count: ["safe_count", "safe", "safe_behaviors"]
    comments: ["comments", "comment", "notes"]
    corrective_action_created: ["corrective_action_created", "action_created", "ca_created"]
    corrective_action_status: ["corrective_action_status", "action_status", "status"]
    closure_date: ["closure_date", "action_closed_date", "closed_date"]
    supervisor_participation: ["supervisor_participation", "supervisor_present", "leadership_present"]
    serious_potential: ["serious_potential", "sif_potential", "high_potential"]

  exposure:
    location: ["project number", "project_number", "location", "site"]
    date: ["date", "month", "valuation date", "valuation_date"]
    exposure_hours: ["hours", "exposure_hours", "work_hours"]
